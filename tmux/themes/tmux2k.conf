# tmux2k theme configuration
# https://github.com/2KAbhishek/tmux2k

set -g @tmux2k-theme 'catppuccin'
set -g @tmux2k-icons-only false

# Catppuccin Mocha palette overrides
set -g @tmux2k-black '#1e1e2e'
set -g @tmux2k-gray '#313244'
set -g @tmux2k-white '#cdd6f4'
set -g @tmux2k-light_blue '#89dceb'
set -g @tmux2k-blue '#89b4fa'
set -g @tmux2k-light_green '#94e2d5'
set -g @tmux2k-green '#a6e3a1'
set -g @tmux2k-light_red '#eba0ac'
set -g @tmux2k-red '#f38ba8'
set -g @tmux2k-yellow '#f9e2af'
set -g @tmux2k-orange '#fab387'
set -g @tmux2k-pink '#f5c2e7'
set -g @tmux2k-purple '#cba6f7'
set -g @tmux2k-light_purple '#b4befe'
set -g @tmux2k-text '#cdd6f4'
set -g @tmux2k-bg-main '#1e1e2e'

# Left: current directory + git branch
set -g @tmux2k-left-plugins "cwd git"

# Right: battery, cpu, ram, gpu, time
set -g @tmux2k-right-plugins "battery cpu ram gpu time"

# Window list: rounded pill separators
set -g @tmux2k-window-list-left-sep ''
set -g @tmux2k-window-list-right-sep ''
set -g @tmux2k-window-list-colors "black purple"
set -g @tmux2k-light-green '#a6e3a1'

# Left panel: muted backgrounds with accent text
set -g @tmux2k-git-colors "gray green"
set -g @tmux2k-cwd-colors "gray blue"

# Right panel: muted backgrounds with accent text
set -g @tmux2k-battery-colors "gray green"
set -g @tmux2k-cpu-colors "gray blue"
set -g @tmux2k-ram-colors "gray yellow"
set -g @tmux2k-gpu-colors "gray red"
set -g @tmux2k-time-colors "gray purple"

# CPU: single aggregate percentage
set -g @tmux2k-cpu-display-usage true
set -g @tmux2k-cpu-display-load false

set -g @tmux2k-git-display-status true
set -g @tmux2k-refresh-rate 5
